<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 320px; font-family: system-ui, sans-serif; padding: 16px; background: #f8fafc; }
    h1 { font-size: 16px; color: #0f172a; margin-bottom: 4px; }
    p { font-size: 12px; color: #64748b; margin-bottom: 10px; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; }
    #syncBtn { background: #0f172a; color: white; }
    #syncBtn:disabled { opacity: 0.5; }
    #status { font-size: 12px; padding: 10px; border-radius: 8px; margin-bottom: 8px; background: #fff; border: 1px solid #e2e8f0; }
    #status.ok { border-color: #a7f3d0; background: #ecfdf5; color: #065f46; }
    #status.err { border-color: #fecaca; background: #fef2f2; color: #991b1b; }
    #status.wait { color: #64748b; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.ok { background: #10b981; }
    .dot.err { background: #ef4444; }
    .dot.wait { background: #94a3b8; }
    a { color: #0284c7; font-size: 12px; }
  </style>
</head>
<body>
  <h1>Vinted Hub Sync</h1>
  <p>Sync automático a cada 10s com Vinted aberta.</p>

  <div id="status" class="wait"><span class="dot wait"></span>A verificar…</div>

  <button id="syncBtn">Sincronizar agora</button>
  <p><a id="setupLink" href="https://vtw42b22dk-creator.github.io/vinted-hub/" target="_blank">Abrir o dashboard</a></p>

  <script src="popup.js"></script>
</body>
</html>
