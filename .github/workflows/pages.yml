name: Publicar no GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install

      - name: Build (static export para GitHub Pages)
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_FUNCTIONS_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_FUNCTIONS_URL }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: PWA — URL absoluta no manifest
        run: node scripts/patch-pwa.mjs
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Verificar build
        run: |
          test -f out/index.html || (echo "ERRO: out/index.html não existe" && exit 1)
          test -f out/.nojekyll || echo "AVISO: .nojekyll em falta"
          echo "Build OK"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: publicar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
